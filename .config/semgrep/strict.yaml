rules:
  - id: function-with-evil
    patterns:
      - pattern-inside: |
          def $FUNC(...):
            ...
      - pattern: |
          "=~/.*evil1.*$/"
      # TODO somehow allow matching a separate node
      - pattern: |
          "=~/.*evil2.*$/"
    message: "Function '$FUNC' contains evil1 and evil2"
    languages: [python]
    severity: ERROR
